<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Life</title>
    <script src="dist/script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container" class="center">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <div id="buttons-container" class="center">
        <button id="next">Next</button>
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
        <label for="speed">Speed</label>
        <input id="speed" type="range" min="0" max="900" value="550">
        <label for="population">Population</label>
        <input id="population" type="range" min="0" max="100" value="20">
    </div>
</body>
</html>
